# Main runtime environment for PypKaTools.
#
# Create it with:
#   conda env create -f environment.yml
#   conda activate pypkatool
#   pip install -e .
#
# See README.md "Installation" for the full setup, including the small
# Python 2.7 helper environment (environment-py27.yml) that PyPKA needs
# internally for pdb2pqr.
name: pypkatool
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # DelPhi4py (PyPKA's compiled Poisson-Boltzmann backend) was built against
  # GFortran 7 (symbol GFORTRAN_7) and the NumPy 1.x C API — both pins below
  # are required, not just recommended.
  - libgfortran4=7.5.0
  - pip
  - pip:
      - "numpy<2"
      - pypka
      - pKAI
